title: CrespoGuard Community Edition
description: Documentation for RF Online server owners deploying the CrespoGuard launcher.
url: "https://crespocyberconsultingllc.github.io"
baseurl: "/crespoguard-docs"

remote_theme: just-the-docs/just-the-docs

# Color scheme (dark by default, toggle available)
color_scheme: dark

# Enable search
search_enabled: true
search.heading_level: 3

# Footer
footer_content: "&copy; 2026 Crespo Cyber Consulting LLC. All rights reserved."

# Exclude non-doc files
exclude:
  - "*.bat"
  - "*.ps1"
  - "*.exe"
  - "*.dll"
  - "*.sig"
  - "*.ico"
  - "*.bin"
  - "node_modules/"
  - "build/"
  - "build-*/"
  - "libs/"
  - "src/"
  - "common/"
  - "resources/"
  - "patch/"
  - "CMakeLists.txt"
  - "CLAUDE.md"
  - ".claude/"
  - ".superpowers/"

# Navigation order
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/CrespoCyberConsultingLLC/crespoguard-docs"

aux_links_new_tab: true

# Google Analytics (optional — uncomment and add your ID)
# ga_tracking: G-XXXXXXXXXX
