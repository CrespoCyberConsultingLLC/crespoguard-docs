site_name: CrespoGuard
site_description: Documentation for RF Online server owners deploying the CrespoGuard launcher and security suite.
site_url: https://crespocyberconsultingllc.github.io/crespoguard-docs/
repo_url: https://github.com/CrespoCyberConsultingLLC/crespoguard-docs
repo_name: crespoguard-docs
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Launcher:
    - Setup Guide: launcher/SETUP.md
    - Creating config.bin: launcher/CONFIG_CREATION.md
    - Config Reference: launcher/CONFIG_REFERENCE.md
    - Theming & Branding: launcher/THEMING.md
    - Assets: launcher/ASSETS.md
    - Deployment: launcher/DEPLOYMENT.md
    - Relay Setup: launcher/RELAY.md
  - ZoneMod:
    - Setup Guide: zonemod/SETUP.md
    - Module Catalog: zonemod/CATALOG.md
    - Configuration Guide: zonemod/CONFIGURATION.md
    - GM Commands: zonemod/GM_COMMANDS.md
    - JS Scripting: zonemod/SCRIPTING.md
    - Event Reference: zonemod/EVENTS.md
    - API Reference: zonemod/API.md
  - AI Assistant:
    - Overview: ai/OVERVIEW.md
    - Usage Guide: ai/USAGE.md
    - Retraining: ai/RETRAINING.md
  - RF Dev Tool:
    - Overview: devtool/OVERVIEW.md
    - Quick Start: devtool/QUICKSTART.md
    - Visual Editors: devtool/EDITORS.md
    - Reference: devtool/REFERENCE.md
  - Features:
    - Feature Comparison: FEATURES.md
    - Premium Tiers: PREMIUM_TIERS.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CrespoCyberConsultingLLC
  generator: false

copyright: "&copy; 2026 Crespo Cyber Consulting LLC. All rights reserved."
